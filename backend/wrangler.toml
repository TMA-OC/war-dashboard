name = "war-dashboard-api"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[vars]
FRONTEND_URL = "https://war-dashboard.vercel.app"

[[triggers]]
crons = ["*/2 * * * *"]

# Secrets (set via `wrangler secret put`):
# DATABASE_URL
# JWT_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# MAPBOX_TOKEN
