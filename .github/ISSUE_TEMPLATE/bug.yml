name: Bug
description: QA files a bug
title: "[BUG] "
labels: ["type:bug", "role:qa", "track"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence (logs, screenshots)
