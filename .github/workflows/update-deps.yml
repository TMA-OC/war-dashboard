name: Dependency Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit frontend dependencies
        id: frontend-audit
        working-directory: frontend
        run: |
          npm install --ignore-scripts 2>/dev/null || true
          npm audit --audit-level=moderate --json > /tmp/frontend-audit.json 2>&1 || echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV

      - name: Audit backend dependencies
        id: backend-audit
        working-directory: backend
        run: |
          npm install --ignore-scripts 2>/dev/null || true
          npm audit --audit-level=moderate --json > /tmp/backend-audit.json 2>&1 || echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV

      - name: Create issue if vulnerabilities found
        if: env.VULNERABILITIES_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] npm audit vulnerabilities found — ${date}`,
              body: `## Security Vulnerabilities Detected\n\nThe weekly \`npm audit\` run found vulnerabilities.\n\n**Action required:** Review and update affected packages.\n\nRun \`npm audit fix\` in \`frontend/\` and/or \`backend/\` to resolve.\n\n_Triggered by: [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`,
              labels: ['security', 'dependencies'],
            });
